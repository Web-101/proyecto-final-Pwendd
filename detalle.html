<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de la película</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/detalle.css">
</head>

<body>

    <!-- Header -->
    <div id="header"></div>


    <main class="principal-detalle">


        <section class="detalle-banner">
            <img id="foto" class="foto-detalle" alt="Imagen de la película">

            <article class="detalle-banner-contenido">
                <h1 id="titulo"></h1>
                <p id="descripcion-corta"></p>
            </article>
        </section>


        <section class="contenedor-detalle">


            <article class="informacion-pelicula">
                <h2>SINOPSIS</h2>
                <p id="descripcion"></p>

                <section class="datos-pelicula">
                    <div class="dato">
                        <span>DIRECTOR</span>
                        <strong id="director"></strong>
                    </div>
                    <div class="dato">
                        <span>GÉNERO</span>
                        <strong id="genero"></strong>
                    </div>
                    <div class="dato">
                        <span>CLASIFICACIÓN</span>
                        <strong id="calificacion"></strong>
                    </div>
                    <div class="dato">
                        <span>AUDIO</span>
                        <strong id="audio"></strong>
                    </div>
                </section>
            </article>


            <aside class="funciones-pelicula">
                <h2>FUNCIONES DISPONIBLES</h2>
                <h3>SELECCIONA UNA FECHA</h3>

                <div id="fechas" class="fechas">
                    <button type="button" class="boton-fecha" data-fecha="15">Hoy <span>15</span></button>
                    <button type="button" class="boton-fecha" data-fecha="16">Sáb <span>16</span></button>
                    <button type="button" class="boton-fecha" data-fecha="17">Dom <span>17</span></button>
                    <button type="button" class="boton-fecha" data-fecha="18">Lun <span>18</span></button>
                    <button type="button" class="boton-fecha" data-fecha="19">Mar <span>19</span></button>
                </div>


                <section class="grupo-horarios">
                    <h3>IMAX 3D</h3>
                    <div id="horariosImax" class="horarios"></div>
                </section>

                <section class="grupo-horarios">
                    <h3>DIGITAL 2D</h3>
                    <div id="horariosDigital" class="horarios"></div>
                </section>
            </aside>

        </section>
    </main>


    <div id="footer"></div>

    <script src="js/index.js"></script>
    <script src="js/detalle.js"></script>
</body>

</html>
