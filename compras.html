<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar compra</title>


    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/compras.css">
</head>

<body>

    <div id="header"></div>


    <main class="pagina-compras">


        <section class="resumen-compra">
            <h1>RESUMEN DE LA COMPRA</h1>
            <p>Película: <strong id="peliculaResumen"></strong></p>
            <p>Función: <strong id="funcionResumen"></strong></p>
            <p>Asientos: <strong id="asientosResumen"></strong></p>
            <p>Total: <strong id="totalResumen"></strong></p>
        </section>


        <form id="formularioCompra" class="formulario-compra">
            <h2>DATOS DEL CLIENTE</h2>

            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ingrese su nombre" required>

            <label for="correo">Correo electrónico</label>
            <input type="email" id="correo" placeholder="correo@ejemplo.com" required>

            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" placeholder="Opcional">

            <button type="submit">FINALIZAR COMPRA</button>
        </form>


        <section id="confirmacion" class="confirmacion">


            <article class="exito">
                <div class="centro">✓</div>
                <h1 id="mensajeGracias"></h1>
                <p>Tu compra fue registrada correctamente.</p>
            </article>

            <article class="ticket">
                <section class="datos-ticket">
                    <h2 id="tituloTicket"></h2>
                    <p>Función: <strong id="funcionTicket"></strong></p>
                    <p>Butacas: <strong id="butacasTicket"></strong></p>
                    <p>Total: <strong id="totalTicket"></strong></p>
                    <p>Correo: <strong id="correoTicket"></strong></p>
                    <p>Teléfono: <strong id="telefonoTicket"></strong></p>
                </section>

                <img id="imagenTicket" alt="Póster de la película">
            </article>


            <a href="index.html" class="volver">VOLVER A LA CARTELERA</a>
        </section>

    </main>


    <div id="footer"></div>


    <script src="js/index.js"></script>
    <script src="js/compras.js"></script>
</body>

</html>
